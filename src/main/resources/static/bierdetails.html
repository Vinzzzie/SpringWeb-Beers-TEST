<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bierdetails</title>
    <link rel="icon" type="image/png" href="img/beers.ico">
    <link rel="stylesheet" type="text/css" href="css/bootstrapstyle.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="js/bierdetails.js" defer></script>
</head>
<body>

<nav class="navbar navbar-expand-sm bg-body-tertiary py-3">
    <div class="container custom-navbar">
        <a class="navbar-brand " href="#">
            <img class="navbar-icon" src="img/beers.ico" alt="BeerIcoon" width="60">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="index.html" aria-current="page">Welkom</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="brouwers.html">Brouwers</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="biermandje.html" id="nav-biermandje" hidden>Biermandje</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mx-5 p-4">
    <h1 id="bier-naam">Het desbetreffende bier</h1>
</div>

<div class="container mx-5 p-4">
    <label class="fw-bold fs-5" for="bier-alcohol">Alcohol</label>
    <p id="bier-alcohol">6,66%</p>
    <label class="fw-bold fs-5" for="bier-prijs">Prijs</label>
    <p id="bier-prijs">€6,66</p>
</div>
<div class="container mx-5 p-4">
    <button type="button" class="btn btn-secondary fw-bold fs-5" id="terug-button">
        Terug
    </button>
    <button type="button" class="btn btn-success fw-bold fs-5" id="add-bier">
        Voeg toe aan winkelmandje
    </button>
</div>
<div class="container mx-5 p-4">
    <div class="alert alert-info" role="alert" id="info-alert" hidden>
        <div class="d-flex p-3">
            <h1>Bier succesvol toegevoegd</h1>
        </div>
    </div>
    <div class="alert alert-danger" role="alert" id="danger-alert" hidden>
        <div class="d-flex p-3">
            <h1>Bier staat al in de bestelling</h1>
        </div>
    </div>
</div>
</body>
</html>
